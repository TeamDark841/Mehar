<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:#050816;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* Animated Background */

.bg{
position:absolute;
width:120%;
height:120%;
background:
radial-gradient(circle at 20% 20%,#00d4ff55,transparent 30%),
radial-gradient(circle at 80% 30%,#ff008855,transparent 35%),
radial-gradient(circle at 50% 80%,#7b2cff55,transparent 35%),
linear-gradient(135deg,#050816,#09132d,#050816);
background-size:200% 200%;
animation:bgMove 15s ease infinite;
transform:scale(1.2);
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Parallax Circles */

.circle{
position:absolute;
border-radius:50%;
filter:blur(60px);
animation:float 8s infinite ease-in-out;
}

.c1{
width:250px;
height:250px;
background:#00d4ff55;
top:10%;
left:15%;
}

.c2{
width:300px;
height:300px;
background:#ff008855;
bottom:10%;
right:15%;
animation-delay:2s;
}

.c3{
width:220px;
height:220px;
background:#7b2cff66;
top:50%;
left:60%;
animation-delay:4s;
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-40px);
}
}

/* Glass Card */

.card{
position:relative;
z-index:5;
width:90%;
max-width:650px;
padding:60px;
text-align:center;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(20px);
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
animation:fade 1.5s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:55px;
font-weight:700;
margin-bottom:20px;
background:linear-gradient(90deg,#00d4ff,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:20px;
line-height:1.8;
color:#ddd;
margin-bottom:35px;
}

.loader{
width:70px;
height:70px;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid #00d4ff;
border-radius:50%;
margin:auto;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.footer{
margin-top:35px;
font-size:14px;
opacity:.8;
letter-spacing:2px;
}

@media(max-width:700px){

h1{
font-size:38px;
}

p{
font-size:17px;
}

.card{
padding:40px 25px;
}

}
</style>
</head>

<body>

<div class="bg"></div>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="card">
<h1>We Are In Maintenance</h1>

<p>
Our website is currently undergoing scheduled maintenance.<br>
We're working hard to improve your experience and will be back shortly.
</p>

<div class="loader"></div>

<div class="footer">
THANK YOU FOR YOUR PATIENCE
</div>

</div>

<script>
document.addEventListener("mousemove", function(e){

const x = (window.innerWidth/2 - e.clientX)/40;
const y = (window.innerHeight/2 - e.clientY)/40;

document.querySelector(".bg").style.transform =
`translate(${x}px,${y}px) scale(1.2)`;

document.querySelector(".c1").style.transform =
`translate(${x}px,${y}px)`;

document.querySelector(".c2").style.transform =
`translate(${-x}px,${-y}px)`;

document.querySelector(".c3").style.transform =
`translate(${x/2}px,${-y/2}px)`;

});
</script>

</body>
  </html>
